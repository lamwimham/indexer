# ===========================================
# Web3 Indexer - Docker Compose
# ===========================================

version: '3.8'

services:
  # ===========================================
  # Indexer Service
  # ===========================================
  indexer:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: web3-indexer
    restart: unless-stopped
    ports:
      - "${PORT:-3000}:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - DATABASE_URL=postgresql://${POSTGRES_USER:-indexer}:${POSTGRES_PASSWORD:-indexer}@postgres:5432/${POSTGRES_DB:-indexer}
      - RPC_URL=${RPC_URL}
      - CHAIN_ID=${CHAIN_ID:-1}
      - START_BLOCK=${START_BLOCK:-0}
      - BATCH_SIZE=${BATCH_SIZE:-100}
      - CONFIRMATIONS=${CONFIRMATIONS:-12}
      - SYNC_INTERVAL=${SYNC_INTERVAL:-1000}
      - MAX_CONCURRENT_REQUESTS=${MAX_CONCURRENT_REQUESTS:-5}
      - CONTRACTS=${CONTRACTS}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - indexer-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # ===========================================
  # PostgreSQL Database
  # ===========================================
  postgres:
    image: postgres:15-alpine
    container_name: web3-indexer-db
    restart: unless-stopped
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-indexer}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-indexer}
      - POSTGRES_DB=${POSTGRES_DB:-indexer}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - indexer-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-indexer} -d ${POSTGRES_DB:-indexer}"]
      interval: 10s
      timeout: 5s
      retries: 5
    ports:
      - "${POSTGRES_PORT:-5432}:5432"

  # ===========================================
  # Redis (for distributed locking)
  # ===========================================
  redis:
    image: redis:7-alpine
    container_name: web3-indexer-redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis-data:/data
    networks:
      - indexer-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    ports:
      - "${REDIS_PORT:-6379}:6379"

  # ===========================================
  # Prometheus (for metrics)
  # ===========================================
  prometheus:
    image: prom/prometheus:latest
    container_name: web3-indexer-prometheus
    restart: unless-stopped
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.enable-lifecycle'
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    networks:
      - indexer-network
    ports:
      - "${PROMETHEUS_PORT:-9090}:9090"
    profiles:
      - monitoring

  # ===========================================
  # Grafana (for visualization)
  # ===========================================
  grafana:
    image: grafana/grafana:latest
    container_name: web3-indexer-grafana
    restart: unless-stopped
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_ADMIN_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:-admin}
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana-data:/var/lib/grafana
      - ./monitoring/grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./monitoring/grafana/datasources:/etc/grafana/provisioning/datasources:ro
    networks:
      - indexer-network
    ports:
      - "${GRAFANA_PORT:-3001}:3000"
    depends_on:
      - prometheus
    profiles:
      - monitoring

# ===========================================
# Networks
# ===========================================
networks:
  indexer-network:
    driver: bridge

# ===========================================
# Volumes
# ===========================================
volumes:
  postgres-data:
  redis-data:
  prometheus-data:
  grafana-data: