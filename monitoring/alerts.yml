# ===========================================
# Prometheus Alert Rules
# ===========================================

groups:
  - name: indexer_alerts
    rules:
      # ===========================================
      # Sync Lag Alerts
      # ===========================================
      - alert: IndexerLagHigh
        expr: indexer_sync_lag_blocks > 1000
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Indexer sync lag is high"
          description: "Indexer for {{ $labels.contract_name }} on chain {{ $labels.chain_id }} is {{ $value }} blocks behind."

      - alert: IndexerLagCritical
        expr: indexer_sync_lag_blocks > 10000
        for: 10m
        labels:
          severity: critical
        annotations:
          summary: "Indexer sync lag is critical"
          description: "Indexer for {{ $labels.contract_name }} on chain {{ $labels.chain_id }} is {{ $value }} blocks behind. Immediate attention required."

      # ===========================================
      # Sync Status Alerts
      # ===========================================
      - alert: IndexerNotSyncing
        expr: indexer_is_syncing == 0
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "Indexer is not syncing"
          description: "Indexer for {{ $labels.contract_address }} on chain {{ $labels.chain_id }} has not been syncing for 10 minutes."

      # ===========================================
      # Error Rate Alerts
      # ===========================================
      - alert: HighErrorRate
        expr: rate(indexer_errors_total[5m]) > 1
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High error rate detected"
          description: "Indexer is experiencing {{ $value }} errors per second for {{ $labels.contract_address }} on chain {{ $labels.chain_id }}."

      # ===========================================
      # RPC Latency Alerts
      # ===========================================
      - alert: RPCLatencyHigh
        expr: histogram_quantile(0.95, rate(indexer_rpc_latency_seconds_bucket[5m])) > 2
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "RPC latency is high"
          description: "95th percentile RPC latency is {{ $value }}s. Consider checking RPC endpoint health."

      # ===========================================
      # Reorg Alerts
      # ===========================================
      - alert: ChainReorgDetected
        expr: increase(indexer_reorg_total[5m]) > 0
        for: 1m
        labels:
          severity: info
        annotations:
          summary: "Chain reorganization detected"
          description: "A chain reorganization of {{ $value }} blocks was detected on chain {{ $labels.chain_id }}."

      - alert: FrequentReorgs
        expr: increase(indexer_reorg_total[1h]) > 3
        for: 1m
        labels:
          severity: warning
        annotations:
          summary: "Frequent chain reorganizations"
          description: "{{ $value }} reorganizations detected in the last hour on chain {{ $labels.chain_id }}."

      # ===========================================
      # Availability Alerts
      # ===========================================
      - alert: IndexerDown
        expr: up{job="web3-indexer"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Indexer is down"
          description: "Web3 Indexer instance is not responding."

      # ===========================================
      # Database Alerts
      # ===========================================
      - alert: DatabaseLatencyHigh
        expr: histogram_quantile(0.95, rate(indexer_db_latency_seconds_bucket[5m])) > 0.5
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Database latency is high"
          description: "95th percentile database latency is {{ $value }}s. Consider optimizing queries or scaling database."