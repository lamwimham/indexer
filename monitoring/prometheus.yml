# ===========================================
# Prometheus Configuration
# ===========================================

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    monitor: 'web3-indexer'

# Alertmanager configuration
alerting:
  alertmanagers:
    - static_configs:
        - targets: []

# Load rules
rule_files:
  - /etc/prometheus/alerts.yml

# Scrape configurations
scrape_configs:
  # ===========================================
  # Web3 Indexer
  # ===========================================
  - job_name: 'web3-indexer'
    static_configs:
      - targets: ['indexer:3000']
    metrics_path: '/metrics'
    scrape_interval: 10s

  # ===========================================
  # Prometheus self-monitoring
  # ===========================================
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']